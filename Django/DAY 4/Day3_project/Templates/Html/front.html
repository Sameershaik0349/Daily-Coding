<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <table border="3">
        <tr>
            <th>emp_id</th>
            <th>emp_name</th>
            <th>emp_sal</th>
            <th>emp_dep</th>
            <th>emp-mail</th>
        </tr>
        {%for x in data %}
        <tr>
            <td>{{x.emp_id}}</td>
            <td>{{x.emp_name}}</td>
            <td>{{x.emp_dep}}</td> 
            <td>{{x.emp_sal}}</td>  
            <td>{{x.emp_mail}}</td>
        </tr>
        {% endfor %}
    </table>
</body>
</html>
