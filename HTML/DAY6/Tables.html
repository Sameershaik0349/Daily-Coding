<!DOCTYPE html>
<html lang="en">

<head>

</head>

<body>

        <h1>TABLES</h1>

                        <img src="" alt="hello">

                </tr>
                <tr>
                    <td>2</td>
                    <td>shaik</td>
                    <!-- <td>ai</td> -->

            </tbody>

</html>
