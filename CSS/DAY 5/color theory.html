<!--
color theory
 color name
 hexa decimal format -#6char a-f 0-9
 rgb red green blue 0-255
 rgba - red green blue alpha 0.1-1 for transparency
 hsl -hue saturation lightness(%)
 hsla-- same with alpha
 
 --------------------------
 multiple color
 linear-gradient -- we can adjust direction
 repating -linear-gradient - we can adjust how much color we want aslo
 radial gradient - it comes with circle format
 repeating -radial-gradient -- it for reparting
 -->
